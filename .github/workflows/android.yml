name: Build Android Artifacts

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest
    env:
      HAS_RELEASE_SIGNING: ${{ secrets.HABIT_RELEASE_KEYSTORE_BASE64 != '' && secrets.HABIT_RELEASE_STORE_PASSWORD != '' && secrets.HABIT_RELEASE_KEY_ALIAS != '' && secrets.HABIT_RELEASE_KEY_PASSWORD != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android 16 SDK
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Build debug APK
        run: |
          gradle assembleDebug 2>&1 | tee debug-build.log

      - name: Upload debug build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Habit-Tracker-v0.2.0-debug-build-log
          path: debug-build.log

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Habit-Tracker-v0.2.0-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Build release APK and AAB
        run: gradle assembleRelease bundleRelease

      - name: Upload unsigned release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Habit-Tracker-v0.2.0-release-unsigned
          path: |
            app/build/outputs/apk/release/app-release-unsigned.apk
            app/build/outputs/bundle/release/app-release.aab

      - name: Decode release keystore
        if: env.HAS_RELEASE_SIGNING == 'true'
        run: |
          echo "${{ secrets.HABIT_RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/habit-release.jks"

      - name: Build signed internal testing artifacts
        if: env.HAS_RELEASE_SIGNING == 'true'
        env:
          HABIT_RELEASE_STORE_FILE: ${{ runner.temp }}/habit-release.jks
          HABIT_RELEASE_STORE_PASSWORD: ${{ secrets.HABIT_RELEASE_STORE_PASSWORD }}
          HABIT_RELEASE_KEY_ALIAS: ${{ secrets.HABIT_RELEASE_KEY_ALIAS }}
          HABIT_RELEASE_KEY_PASSWORD: ${{ secrets.HABIT_RELEASE_KEY_PASSWORD }}
        run: gradle clean assembleRelease bundleRelease

      - name: Upload signed internal testing artifacts
        if: env.HAS_RELEASE_SIGNING == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: Habit-Tracker-v0.2.0-signed-internal
          path: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab
