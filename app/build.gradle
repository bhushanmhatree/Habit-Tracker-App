plugins {
    id "com.android.application"
}

android {
    namespace "com.habittracker"
    compileSdk 36

    defaultConfig {
        applicationId "com.habittracker"
        minSdk 26
        targetSdk 36
        versionCode 2
        versionName "0.2.0"
    }

    signingConfigs {
        release {
            def storeFilePath = System.getenv("HABIT_RELEASE_STORE_FILE")
            if (storeFilePath != null && storeFilePath.length() > 0) {
                storeFile file(storeFilePath)
                storePassword System.getenv("HABIT_RELEASE_STORE_PASSWORD")
                keyAlias System.getenv("HABIT_RELEASE_KEY_ALIAS")
                keyPassword System.getenv("HABIT_RELEASE_KEY_PASSWORD")
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
            if (System.getenv("HABIT_RELEASE_STORE_FILE") != null) {
                signingConfig signingConfigs.release
            }
        }
    }
}

dependencies {
    implementation "androidx.health.connect:connect-client:1.2.0-alpha04"
}
